<!-- templates/employees/new.html -->
{% extends "base.html" %}

{% block title %}社員新規登録{% endblock %}

{% block content %}
<div class="container">
    <h1>社員新規登録</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST">
        <div class="form-group">
            <label>社員ID *</label>
            <input type="text" name="employee_id" class="form-control" 
                   value="{{ form_data.employee_id if form_data else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>氏名 *</label>
            <input type="text" name="name" class="form-control" 
                   value="{{ form_data.name if form_data else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>氏名カナ *</label>
            <input type="text" name="name_kana" class="form-control" 
                   value="{{ form_data.name_kana if form_data else '' }}" required>
        </div>
                
        <div class="form-group">
            <label>部署 *</label>
            <input type="text" name="department" class="form-control" 
                   value="{{ form_data.department if form_data else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>役職 *</label>
            <input type="text" name="position" class="form-control" 
                   value="{{ form_data.position if form_data else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>入社日 *</label>
            <input type="date" name="hire_date" class="form-control" 
                   value="{{ form_data.hire_date if form_data else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>給与 *</label>
            <input type="number" name="salary" class="form-control" 
                   value="{{ form_data.salary if form_data else '' }}" required>
        </div>

        <div class="form-group">
            <label>メールアドレス *</label>
            <input type="email" name="email" class="form-control" 
                   value="{{ form_data.email if form_data else '' }}" required>
        </div>
        
        <button type="submit" class="btn btn-primary">登録</button>
        <a href="/" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
{% endblock %}
